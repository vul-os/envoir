<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Envoir">
  <title>Envoir (monochrome)</title>
  <!-- Single-color mark; inherits `color` via currentColor. Works on light or dark. -->
  <g stroke="currentColor" fill="currentColor">
    <rect x="30" y="40" width="68" height="48" rx="9" fill="none" stroke-width="5"/>
    <path d="M33 45 L64 68 L95 45" fill="none" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="33" cy="45" r="6" stroke="none"/>
    <circle cx="95" cy="45" r="6" stroke="none"/>
    <circle cx="64" cy="68" r="7" stroke="none"/>
    <path d="M33 45 L95 45" stroke-width="2.5" stroke-opacity="0.4" stroke-dasharray="3 5" fill="none"/>
  </g>
</svg>
