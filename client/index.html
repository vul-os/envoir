<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Envoir — sovereign mail, chat & files</title>
  <link rel="stylesheet" href="css/app.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%89%EF%B8%8F%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- Onboarding overlay (shown until an identity exists) -->
  <div id="onboarding" class="overlay hidden"></div>

  <!-- Main app shell -->
  <div id="app" class="app hidden">
    <nav class="rail">
      <div class="rail-brand" title="Envoir">✉</div>
      <button class="rail-btn" data-view="mail" title="Mail">
        <svg viewBox="0 0 24 24"><path d="M3 5h18v14H3z"/><path d="M3 6l9 7 9-7"/></svg>
        <span>Mail</span>
      </button>
      <button class="rail-btn" data-view="chat" title="Chat">
        <svg viewBox="0 0 24 24"><path d="M4 4h16v11H8l-4 4z"/></svg>
        <span>Chat</span>
      </button>
      <button class="rail-btn" data-view="files" title="Files">
        <svg viewBox="0 0 24 24"><path d="M4 5h5l2 2h9v12H4z"/></svg>
        <span>Files</span>
      </button>
      <button class="rail-btn" data-view="contacts" title="Contacts">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
        <span>People</span>
      </button>
      <button class="rail-btn" data-view="calendar" title="Calendar & contacts">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>
        <span>Calendar</span>
      </button>
      <div class="rail-spacer"></div>
      <button class="rail-btn" data-view="network" title="Network">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="5" cy="18" r="2"/><circle cx="19" cy="18" r="2"/><path d="M7 7l3 3m7-3l-3 3m0 4l3 3m-10 0l3-3"/></svg>
        <span>Network</span>
      </button>
      <button class="rail-btn" data-view="settings" title="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/></svg>
        <span>Settings</span>
      </button>
      <button class="rail-id" id="rail-id" title="Your identity"></button>
    </nav>

    <main id="view" class="view"><!-- view content injected here --></main>
  </div>

  <!-- Toast + MOTE inspector -->
  <div id="toast" class="toast hidden"></div>
  <div id="inspector" class="inspector hidden"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
