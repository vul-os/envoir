<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Envoir Console — domain &amp; organization administration</title>
  <meta name="description" content="The Envoir management console — administer your domain: members (sovereign or org-managed), the directory (GAL), distribution lists, and admin roles. You control names, never a sovereign member's key." />
  <meta name="theme-color" content="#4C4DFF" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#4C4DFF" media="(prefers-color-scheme: light)" />
  <link rel="stylesheet" href="css/console.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
</head>
<body>
  <!-- Setup overlay (shown until a domain authority exists) -->
  <div id="setup" class="overlay hidden"></div>

  <!-- Console shell (rail + workspace injected by shell.js) -->
  <div id="app" class="app hidden"></div>

  <!-- Global overlays -->
  <div id="modal" class="modal hidden"></div>
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
